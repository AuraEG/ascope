name: Production Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_name: ascope-linux-amd64.tar.gz
            exe_suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: ascope-macos-amd64.tar.gz
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: ascope-windows-amd64.exe
            exe_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage unix archive asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive_name }}" ascope

      - name: Stage windows executable asset
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ascope${{ matrix.exe_suffix }}" "dist/${{ matrix.archive_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  build-linux-packages:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build Debian package
        run: |
          mkdir -p dist
          cargo deb --no-build --output dist/ascope-linux-amd64.deb

      - name: Build RPM package
        run: cargo generate-rpm -o dist/ascope-linux-amd64.rpm

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ascope-linux-packages
          path: |
            dist/ascope-linux-amd64.deb
            dist/ascope-linux-amd64.rpm

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - build-linux-packages
    steps:
      - uses: actions/checkout@v4

      - name: Download staged release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-body.md
          files: |
            dist/ascope-linux-amd64.tar.gz
            dist/ascope-linux-amd64.deb
            dist/ascope-linux-amd64.rpm
            dist/ascope-macos-amd64.tar.gz
            dist/ascope-windows-amd64.exe
